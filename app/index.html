<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2f6f50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="旅行记忆">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>旅行意义记录 Agent</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/icon-192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
    <link rel="stylesheet" href="./styles.css?v=9">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="旅行列表">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">3D</div>
          <div>
            <p class="eyebrow">Memory Agent</p>
            <h1>旅行意义记录</h1>
          </div>
          <span class="app-version" id="appVersion">v9</span>
        </div>

        <button class="primary-action" id="newTripButton" type="button">新建旅行</button>

        <div class="sidebar-section">
          <div class="section-heading">
            <span>我的旅行</span>
            <span id="tripCount">0</span>
          </div>
          <div class="trip-list" id="tripList"></div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="activeTripMeta">当前旅行</p>
            <h2 id="activeTripTitle">准备中</h2>
          </div>
          <span class="visually-hidden" id="musicStatus" aria-live="polite"></span>
        </header>

        <section class="record-panel is-hidden" id="recordPanel" aria-labelledby="recordTitle">
          <div class="record-intro">
            <p class="eyebrow">今日记录</p>
            <h3 id="recordTitle">把一个有意义的瞬间存下来</h3>
            <p>先拍照或导入，再写一句当时的感受。复杂整理可以稍后慢慢补。</p>
            <div class="step-chips" aria-label="记录步骤">
              <span>1 照片</span>
              <span>2 说明</span>
              <span>3 保存</span>
            </div>
          </div>

          <form class="record-form" id="memoryForm">
            <label class="media-drop" for="memoryPhotoInput">
              <input id="memoryPhotoInput" type="file" accept="image/*" capture="environment">
              <span class="media-drop-icon">+</span>
              <strong>添加照片</strong>
              <small>支持相机或相册，保存前会自动压缩</small>
            </label>

            <div class="form-fields">
              <label>
                <span>标题</span>
                <input id="memoryTitleInput" name="title" type="text" placeholder="例如：雨后的寺门">
              </label>
              <label>
                <span>地点</span>
                <input id="memoryLocationInput" name="location" type="text" placeholder="例如：京都，南禅寺附近">
              </label>
              <label>
                <span>说明</span>
                <textarea id="memoryNoteInput" name="note" rows="4" placeholder="这里为什么值得记住？可以直接写一句很粗糙的话。"></textarea>
              </label>
              <div class="inline-fields">
                <label>
                  <span>情绪</span>
                  <select id="memoryMoodInput" name="mood">
                    <option value="平静">平静</option>
                    <option value="惊喜">惊喜</option>
                    <option value="好奇">好奇</option>
                    <option value="感动">感动</option>
                    <option value="自由">自由</option>
                    <option value="怀念">怀念</option>
                  </select>
                </label>
                <label>
                  <span>标签</span>
                  <input id="memoryTagsInput" name="tags" type="text" placeholder="街角, 建筑, 雨天">
                </label>
              </div>
              <button class="primary-action" type="submit">保存记忆</button>
            </div>
          </form>
        </section>

        <section class="agent-strip" id="agentStrip" aria-live="polite"></section>

        <section class="view-toolbar" aria-label="记忆视图">
          <div class="tabs" role="tablist">
            <button class="tab is-active" data-view="timeline" type="button">时间线</button>
            <button class="tab" data-view="map" type="button">地图</button>
            <button class="tab" data-view="objects" type="button">3D 记忆库</button>
            <button class="tab" data-view="review" type="button">旅行回顾</button>
          </div>
          <label class="search-box">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="地点、标签、物件或一句回忆">
          </label>
        </section>

        <section class="view-content" id="viewContent" aria-live="polite"></section>
      </main>

      <aside class="inspector" id="inspector" aria-label="记忆详情"></aside>
    </div>

    <dialog class="modal" id="tripDialog">
      <form method="dialog" class="modal-card" id="tripForm">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Trip</p>
            <h3>新建旅行</h3>
          </div>
          <button class="icon-button" value="cancel" type="button" id="closeTripDialog" aria-label="关闭">×</button>
        </div>
        <label>
          <span>旅行名称</span>
          <input id="tripTitleInput" type="text" required placeholder="例如：京都 2026 春">
        </label>
        <label>
          <span>主要地点</span>
          <input id="tripLocationInput" type="text" placeholder="例如：日本京都">
        </label>
        <div class="inline-fields">
          <label>
            <span>开始日期</span>
            <input id="tripStartInput" type="date">
          </label>
          <label>
            <span>结束日期</span>
            <input id="tripEndInput" type="date">
          </label>
        </div>
        <div class="dialog-memory">
          <div>
            <p class="eyebrow">今日记录</p>
            <h4>把第一段有意义的瞬间放进这次旅行</h4>
          </div>
          <label class="media-drop compact" for="tripMemoryPhotoInput">
            <input id="tripMemoryPhotoInput" type="file" accept="image/*" capture="environment">
            <span class="media-drop-icon">+</span>
            <strong>添加照片</strong>
            <small>相机或相册都可以，保存前会自动压缩</small>
          </label>
          <label>
            <span>记忆标题</span>
            <input id="tripMemoryTitleInput" type="text" placeholder="例如：雨后的街角小店">
          </label>
          <label>
            <span>记忆地点</span>
            <input id="tripMemoryLocationInput" type="text" placeholder="例如：京都，哲学之道附近">
          </label>
          <label>
            <span>说明</span>
            <textarea id="tripMemoryNoteInput" rows="3" placeholder="这一刻为什么值得记住？"></textarea>
          </label>
          <div class="inline-fields">
            <label>
              <span>情绪</span>
              <select id="tripMemoryMoodInput">
                <option value="平静">平静</option>
                <option value="惊喜">惊喜</option>
                <option value="好奇">好奇</option>
                <option value="感动">感动</option>
                <option value="自由">自由</option>
                <option value="怀念">怀念</option>
              </select>
            </label>
            <label>
              <span>标签</span>
              <input id="tripMemoryTagsInput" type="text" placeholder="街角, 建筑, 雨天">
            </label>
          </div>
        </div>
        <menu class="modal-actions">
          <button class="ghost-button" type="button" id="cancelTripButton">取消</button>
          <button class="primary-action" type="submit">创建并保存</button>
        </menu>
      </form>
    </dialog>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <h3>还没有旅行记忆</h3>
        <p>点击“新建旅行”，把照片、地点和一句说明一起保存下来。</p>
      </div>
    </template>

    <script src="./main.js?v=9"></script>
  </body>
</html>
